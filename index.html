<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Pro - POS System</title>
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --info: #17a2b8;
            --warning: #ffc107; --danger: #dc3545; --dark: #212529; --bg: #f4f7f6;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #333; margin: 0; padding-bottom: 20px; }
        
        /* Tab Navigation */
        .tabs { display: flex; background: var(--dark); position: sticky; top: 0; z-index: 2000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: bold; cursor: pointer; opacity: 0.6; }
        .tab-btn.active { opacity: 1; border-bottom: 4px solid var(--primary); }

        .view { display: none; padding: 15px; }
        .view.active { display: block; }

        /* POS Table Styling */
        .pos-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .pos-container { grid-template-columns: 1.5fr 1fr; } }

        .search-box { position: sticky; top: 54px; z-index: 1000; background: var(--bg); padding: 10px 0; }
        .pos-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 0.9em; }
        .pos-table th, .pos-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .pos-table th { background: #eee; }

        /* Cart Styling */
        .cart-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); height: fit-content; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #ccc; }
        .undo-btn { color: var(--danger); font-size: 1.2em; cursor: pointer; border: none; background: none; }

        .grand-total { font-size: 1.8em; font-weight: 800; text-align: right; margin: 15px 0; color: var(--dark); }
        
        .cash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .cash-btn { padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #f8f9fa; cursor: pointer; font-weight: bold; }
        
        .payment-status { font-weight: bold; text-align: right; padding: 10px; border-radius: 5px; margin-top: 10px; }
        .status-short { background: #ffebee; color: var(--danger); }
        .status-change { background: #e8f5e9; color: var(--success); }

        /* Legacy Classes from Inventory */
        .card { background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; background: #f8f9fa; }
        .act-btn { padding: 8px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="app" style="display:none">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pos')">POS (SELL)</button>
            <button class="tab-btn" onclick="switchTab('inventory')">INVENTORY</button>
        </div>

        <div id="pos" class="view active">
            <div class="pos-container">
                <div class="inventory-side">
                    <div class="search-box">
                        <input type="text" id="posSearch" placeholder="🔍 Search product to sell..." oninput="renderPOS()">
                    </div>
                    <table class="pos-table">
                        <thead><tr><th>Product</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
                        <tbody id="posBody"></tbody>
                    </table>
                </div>

                <div class="cart-side">
                    <div class="cart-section">
                        <h3 style="margin-top:0">Customer Cart</h3>
                        <div id="cartList"></div>
                        <div class="grand-total" id="grandTotal">₱0.00</div>
                        
                        <label>Amount Paid:</label>
                        <input type="number" id="amountPaid" placeholder="0.00" oninput="calcPayment()">
                        
                        <div class="cash-grid">
                            <button class="cash-btn" onclick="quickCash(20)">₱20</button>
                            <button class="cash-btn" onclick="quickCash(50)">₱50</button>
                            <button class="cash-btn" onclick="quickCash(100)">₱100</button>
                            <button class="cash-btn" onclick="quickCash(200)">₱200</button>
                            <button class="cash-btn" onclick="quickCash(500)">₱500</button>
                            <button class="cash-btn" onclick="quickCash(1000)">₱1k</button>
                        </div>

                        <div id="paymentResult" class="payment-status">Ready</div>
                        <button onclick="completeTransaction()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; margin-top:15px; font-size:1.1em;">COMPLETE TRANSACTION</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="inventory" class="view">
            <div id="inventoryForm">
                <h3>Manage Products</h3>
                <input type="text" id="name" placeholder="Item Name">
                <input type="number" id="cost" placeholder="Total Paid">
                <input type="number" id="qty" placeholder="Qty">
                <input type="number" id="sell" placeholder="Selling Price">
                <button onclick="addItem()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px;">Add Product</button>
            </div>
            <div id="invList" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="setup" style="display:block; padding: 40px; text-align: center;">
        <h2>Shop Login</h2>
        <input type="password" id="ghToken" placeholder="GitHub Token">
        <input type="text" id="ghRepo" placeholder="username/repo">
        <button onclick="saveConfig()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px;">Connect</button>
    </div>

    <script>
        let inventory = [];
        let cart = [];
        let config = JSON.parse(localStorage.getItem('inv_config'));

        if (config) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            fetchData();
        }

        function formatPHP(num) {
            return '₱' + parseFloat(num).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            render();
        }

        // --- POS LOGIC ---

        function renderPOS() {
            const search = document.getElementById('posSearch').value.toLowerCase();
            const body = document.getElementById('posBody');
            body.innerHTML = inventory.filter(i => i.name.toLowerCase().includes(search)).map((item, idx) => `
                <tr>
                    <td><b>${item.name}</b></td>
                    <td>${formatPHP(item.sell)}</td>
                    <td>${item.qty}</td>
                    <td><button onclick="addToCart(${inventory.indexOf(item)})" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:4px;">+ Add</button></td>
                </tr>
            `).join('');
        }

        function addToCart(idx) {
            const item = inventory[idx];
            if(item.qty <= 0) return alert("Out of stock!");
            
            const cartItem = cart.find(c => c.name === item.name);
            if(cartItem) {
                if(cartItem.buyQty < item.qty) cartItem.buyQty++;
                else alert("Limit reached!");
            } else {
                cart.push({...item, buyQty: 1, originalIdx: idx});
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                const subtotal = item.buyQty * item.sell;
                total += subtotal;
                return `
                <div class="cart-item">
                    <span>${item.name} x${item.buyQty}</span>
                    <span>${formatPHP(subtotal)} <button class="undo-btn" onclick="removeFromCart(${i})">⟲</button></span>
                </div>`;
            }).join('');
            document.getElementById('grandTotal').innerText = formatPHP(total);
            calcPayment();
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            renderCart();
        }

        function quickCash(val) {
            document.getElementById('amountPaid').value = val;
            calcPayment();
        }

        function calcPayment() {
            const total = cart.reduce((sum, item) => sum + (item.buyQty * item.sell), 0);
            const paid = parseFloat(document.getElementById('amountPaid').value) || 0;
            const res = document.getElementById('paymentResult');

            if (total === 0) { res.innerText = "Cart is empty"; return; }

            if (paid < total) {
                res.className = "payment-status status-short";
                res.innerText = `Short: ${formatPHP(total - paid)}`;
            } else {
                res.className = "payment-status status-change";
                res.innerText = `Change: ${formatPHP(paid - total)}`;
            }
        }

        function completeTransaction() {
            if(cart.length === 0) return;
            
            // Deduct from main inventory
            cart.forEach(cItem => {
                inventory[cItem.originalIdx].qty -= cItem.buyQty;
            });

            alert("Transaction Complete! Inventory Updated.");
            cart = [];
            document.getElementById('amountPaid').value = '';
            render(); 
            renderCart();
        }

        // --- INVENTORY LOGIC ---
        function render() {
            renderPOS();
            const invList = document.getElementById('invList');
            invList.innerHTML = inventory.map((item, i) => `
                <div class="card">
                    <div style="padding:10px"><b>${item.name}</b> - Stock: ${item.qty}</div>
                    <div class="card-actions">
                        <button class="act-btn" style="background:var(--danger)" onclick="deleteItem(${i})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem() {
            const n = document.getElementById('name').value;
            const q = parseInt(document.getElementById('qty').value);
            const c = parseFloat(document.getElementById('cost').value);
            const s = parseFloat(document.getElementById('sell').value);
            inventory.push({name:n, qty:q, cost:c, sell:s});
            render();
        }

        function deleteItem(i) { if(confirm("Delete?")) { inventory.splice(i,1); render(); } }

        // --- CLOUD LOGIC ---
        async function fetchData() {
            try {
                const res = await fetch(`https://api.github.com/repos/${config.repo}/contents/data.json`, {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                const file = await res.json();
                inventory = JSON.parse(decodeURIComponent(escape(atob(file.content))) || "[]");
                render();
            } catch (err) { console.log("Init failed"); }
        }

        function saveConfig() {
            const t = document.getElementById('ghToken').value;
            const r = document.getElementById('ghRepo').value;
            localStorage.setItem('inv_config', JSON.stringify({token:t, repo:r}));
            location.reload();
        }
    </script>
</body>
</html>
