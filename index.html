<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .qty { font-weight: bold; font-size: 1.2em; color: #007bff; display: flex; align-items: center; gap: 10px; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .sync-btn { background: #28a745; margin-top: 20px; }
        .refresh-btn { background: #6c757d; margin-top: 10px; }
        .del-btn { background: #dc3545; width: auto; padding: 5px 10px; font-size: 0.8em; }
        #reset-area { text-align: right; margin-bottom: 10px; }
        .logout-link { color: #dc3545; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="reset-area">
        <span class="logout-link" onclick="logout()">Logout / Change Repo</span>
    </div>

    <h3>Inventory Tracker</h3>

    <div id="setup" style="display:block; background: white; padding: 15px; border-radius: 10px;">
        <p><small>Enter GitHub Credentials</small></p>
        <input type="password" id="ghToken" placeholder="GitHub Token">
        <input type="text" id="ghRepo" placeholder="username/repo-name">
        <button onclick="saveConfig()">Connect</button>
    </div>

    <div id="app" style="display:none">
        <input type="text" id="name" placeholder="Item Name">
        <input type="number" id="qty" placeholder="Qty">
        <button onclick="addItem()">Add Item</button>
        <hr>
        <div id="list">Loading...</div>
        
        <button class="refresh-btn" onclick="fetchData()">🔄 Refresh List</button>
        <button class="sync-btn" onclick="syncToCloud()">☁️ Sync to All Devices</button>
    </div>

    <script>
        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.log('Service Worker failed', err));
            });
        }

        let inventory = [];
        let config = JSON.parse(localStorage.getItem('inv_config'));

        // Check if we are logged in
        if (config) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            fetchData();
        }

        function saveConfig() {
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            if (token && repo) {
                localStorage.setItem('inv_config', JSON.stringify({token, repo}));
                location.reload();
            } else {
                alert("Please fill in both fields");
            }
        }

        function logout() {
            if(confirm("Clear Token and Repo Name?")) {
                localStorage.clear();
                location.reload();
            }
        }

        async function fetchData() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "Fetching latest data...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${config.repo}/contents/data.json?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${config.token}` }
                });

                if (!res.ok) {
                    throw new Error(`Status ${res.status}: Check Repo Name & Token`);
                }

                const file = await res.json();
                
                const binaryString = atob(file.content);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decodedText = new TextDecoder().decode(bytes);
                
                inventory = JSON.parse(decodedText || "[]");
                render();
            } catch (err) {
                listDiv.innerHTML = `⚠️ Error: ${err.message}<br><br>Click 'Logout' above and verify your username/repo format.`;
                console.error(err);
            }
        }

        async function syncToCloud() {
            const btn = document.querySelector('.sync-btn');
            btn.innerText = "Syncing...";
            btn.disabled = true;

            try {
                const getRes = await fetch(`https://api.github.com/repos/${config.repo}/contents/data.json`, {
                    headers: { 'Authorization': `token ${config.token}` }
                });
                const file = await getRes.json();

                const jsonString = JSON.stringify(inventory);
                const bytes = new TextEncoder().encode(jsonString);
                const base64Content = btoa(String.fromCharCode(...bytes));

                await fetch(`https://api.github.com/repos/${config.repo}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${config.token}` },
                    body: JSON.stringify({
                        message: "update inventory",
                        content: base64Content,
                        sha: file.sha
                    })
                });
                alert("Synced!");
            } catch (err) {
                alert("Sync failed: " + err.message);
            } finally {
                btn.innerText = "☁️ Sync to All Devices";
                btn.disabled = false;
            }
        }

        function render() {
            const listDiv = document.getElementById('list');
            if (inventory.length === 0) {
                listDiv.innerHTML = "<p>No items found.</p>";
                return;
            }
            listDiv.innerHTML = inventory.map((item, i) => `
                <div class="card">
                    <div>
                        <strong>${item.name}</strong>
                        <button class="del-btn" onclick="deleteItem(${i})">Del</button>
                    </div>
                    <div class="qty">
                        <button onclick="updateQty(${i},-1)" style="width:30px">-</button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty(${i},1)" style="width:30px">+</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem() {
            const n = document.getElementById('name');
            const q = document.getElementById('qty');
            if (!n.value) return;
            inventory.push({ name: n.value, qty: parseInt(q.value) || 0 });
            n.value = ''; q.value = '';
            render();
        }

        function updateQty(i, change) {
            inventory[i].qty = Math.max(0, parseInt(inventory[i].qty) + change);
            render();
        }

        function deleteItem(i) {
            if (confirm("Delete?")) {
                inventory.splice(i, 1);
                render();
            }
        }
    </script>
</body>
</html>
